version: "3.8"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - HOROSCOPO_DB_PATH=/data/horoscopo.db
      - APP_BASE_URL=https://hypersecit.com.br
      - ALLOWED_ORIGINS=https://hypersecit.com.br,http://127.0.0.1:8001,http://localhost:8001
    volumes:
      - ./backend/horoscopo.db:/data/horoscopo.db
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8001:80"
    restart: unless-stopped
